<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Employee Directory</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; background:#f5f5f5; }
  h1 { color: #2c3e50; }
  form { background:#fff; padding:16px; border-radius:8px; margin-bottom:20px; box-shadow:0 1px 3px rgba(0,0,0,.1); }
  input { display:block; width:100%; margin-bottom:10px; padding:8px; box-sizing:border-box; }
  button { padding:8px 16px; background:#2c3e50; color:#fff; border:none; border-radius:4px; cursor:pointer; }
  table { width:100%; border-collapse: collapse; background:#fff; }
  th, td { padding:10px; border-bottom:1px solid #eee; text-align:left; }
  .del { background:#c0392b; padding:4px 10px; font-size:12px; }
</style>
</head>
<body>
  <h1>Employee Directory</h1>

  <form id="empForm">
    <input type="text" id="name" placeholder="Name" required>
    <input type="text" id="role" placeholder="Role" required>
    <input type="text" id="department" placeholder="Department" required>
    <input type="email" id="email" placeholder="Email" required>
    <button type="submit">Add Employee</button>
  </form>

  <table id="empTable">
    <thead><tr><th>Name</th><th>Role</th><th>Department</th><th>Email</th><th></th></tr></thead>
    <tbody></tbody>
  </table>

<script>
async function loadEmployees() {
  const res = await fetch('/api/employees');
  const data = await res.json();
  const tbody = document.querySelector('#empTable tbody');
  tbody.innerHTML = '';
  data.forEach(e => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${e.name}</td><td>${e.role}</td><td>${e.department}</td><td>${e.email}</td>
      <td><button class="del" onclick="deleteEmp(${e.id})">Delete</button></td>`;
    tbody.appendChild(tr);
  });
}

async function deleteEmp(id) {
  await fetch('/api/employees/' + id, { method: 'DELETE' });
  loadEmployees();
}

document.getElementById('empForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const body = {
    name: document.getElementById('name').value,
    role: document.getElementById('role').value,
    department: document.getElementById('department').value,
    email: document.getElementById('email').value,
  };
  await fetch('/api/employees', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  e.target.reset();
  loadEmployees();
});

loadEmployees();
</script>
</body>
</html>
