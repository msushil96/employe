version: "3.9"

services:
  app:
    image: ${DOCKER_USERNAME}/myapp:${IMAGE_TAG}
    ports:
      - "80:5000"
    environment:
      APP_PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: app_user
      DB_PASSWORD: app_password
      DB_NAME: employee_directory
    depends_on:
      db:
        condition: service_healthy
    networks:
      - appnet

  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: employee_directory
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    volumes:
      - db_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appnet
    # No ports exposed to host on purpose — DB stays internal to the app network

networks:
  appnet:
    driver: bridge

volumes:
  db_data:
